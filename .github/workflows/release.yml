name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build:chrome

      - run: npm run build:firefox

      - name: Zip builds
        run: |
          cd dist-chrome  && zip -r "../better-roo-chrome-${GITHUB_REF_NAME}.zip"  . && cd ..
          cd dist-firefox && zip -r "../better-roo-firefox-${GITHUB_REF_NAME}.zip" . && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            better-roo-chrome-*.zip
            better-roo-firefox-*.zip
          generate_release_notes: true
