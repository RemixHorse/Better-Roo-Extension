name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Zip extension
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd dist
          zip -r "../better-roo-${VERSION}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: better-roo-*.zip
          generate_release_notes: true
